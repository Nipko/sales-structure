name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            echo "🚀 Inciando despliegue en Hostinger VPS..."
            
            # 1. Preparar directorio
            mkdir -p /opt/parallext-engine
            cd /opt/parallext-engine
            
            # 2. Clonar o actualizar el repo
            if [ ! -d ".git" ]; then
              echo "Clonando repositorio por primera vez..."
              git clone https://github.com/Nipko/sales-structure.git .
            else
              echo "Actualizando repositorio..."
              git fetch origin
              git reset --hard origin/main
            fi
            
            # 3. Crear .env si no existe (usa defaults seguros para desarrollo)
            if [ ! -f ".env" ]; then
              echo "Creando archivo .env con valores por defecto..."
              cp .env.example .env
            fi
            
            # 4. Iniciar Docker (solo DB + Redis por ahora, sin build de apps)
            echo "🐳 Levantando infraestructura base (PostgreSQL + Redis)..."
            docker compose -f infra/docker/docker-compose.yml down || true
            docker compose -f infra/docker/docker-compose.yml up -d
            
            # 5. Verificar que los servicios están arriba
            sleep 5
            echo "📊 Estado de los contenedores:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo "✅ Despliegue completado con éxito"

name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }} # Usar contraseña o SSH_KEY
          # key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "🚀 Inciando despliegue en Hostinger VPS..."
            
            # Asegurarse de que el directorio existe (solo la primera vez)
            mkdir -p /opt/parallext-engine
            cd /opt/parallext-engine
            
            # Si no es un repo git, clonarlo (requiere token o deploy key configurada en el VPS)
            if [ ! -d ".git" ]; then
              echo "Clonando repositorio por primera vez..."
              git clone https://github.com/Nipko/sales-structure.git .
            else
              echo "Actualizando repositorio..."
              git reset --hard HEAD
              git pull origin main
            fi
            
            # Ejecutar despliegue con Docker Compose
            echo "🐳 Construyendo y levantando contenedores Docker..."
            docker compose -f infra/docker/docker-compose.prod.yml down
            docker compose -f infra/docker/docker-compose.prod.yml up -d --build
            
            echo "✅ Despliegue completado con éxito"

name: Deploy Parallext Engine

on:
  push:
    branches:
      - main
      - feature/parallly-commercial-domain
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/nipko/parallext-api
  WORKER_IMAGE: ghcr.io/nipko/parallext-worker
  DASHBOARD_IMAGE: ghcr.io/nipko/parallext-dashboard
  WHATSAPP_IMAGE: ghcr.io/nipko/parallext-whatsapp
  LANDING_IMAGE: ghcr.io/nipko/parallext-landing
  PROJECT_PATH: /opt/parallext-engine

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build & push Docker images to GHCR
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (API)
        run: cd apps/api && npx tsc --noEmit

      - name: TypeScript check (WhatsApp)
        run: cd apps/whatsapp && npx tsc --noEmit

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API — verify module graph resolves
        run: |
          docker run --rm \
            -w /app \
            --entrypoint node \
            ${{ env.API_IMAGE }}:${{ github.sha }} \
            -e "
              // Verify all compiled modules can be required (catches missing deps, bad imports)
              try {
                const m = require('./dist/app.module');
                if (!m.AppModule) throw new Error('AppModule not exported');
                console.log('✅ AppModule loaded — all module imports resolved');
                process.exit(0);
              } catch(e) {
                console.error('❌ Module load FAILED:', e.message);
                process.exit(1);
              }
            "
        timeout-minutes: 1

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.parallly-chat.cloud/api/v1
            NEXT_PUBLIC_WA_SERVICE_URL=https://wa.parallly-chat.cloud/api/v1
            NEXT_PUBLIC_META_APP_ID=${{ secrets.META_APP_ID }}
            NEXT_PUBLIC_META_CONFIG_ID=${{ secrets.META_CONFIG_ID }}
            NEXT_PUBLIC_META_BUSINESS_ID=${{ secrets.META_BUSINESS_ID }}
            NEXT_PUBLIC_META_SOLUTION_ID=${{ secrets.META_SOLUTION_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push WhatsApp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.whatsapp
          push: true
          tags: |
            ${{ env.WHATSAPP_IMAGE }}:latest
            ${{ env.WHATSAPP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test WhatsApp image modules
        run: |
          docker pull ${{ env.WHATSAPP_IMAGE }}:${{ github.sha }}
          docker run --rm --entrypoint node ${{ env.WHATSAPP_IMAGE }}:${{ github.sha }} -e "require('@nestjs/axios'); console.log('WhatsApp image module check OK')"

      - name: Build and push Landing image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.landing
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:latest
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 2: SSH into VPS and deploy
  # Uses: SERVER_HOST, SERVER_USER, SERVER_PASSWORD, SERVER_PORT
  # Project lives at /opt/parallext-engine/
  # ──────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Check if VPS secrets are configured
        id: check_secrets
        env:
          HOST_CHECK: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$HOST_CHECK" ]; then
            echo "::warning::SERVER_HOST not set — skipping SSH deploy."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to VPS
        if: steps.check_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GIT_SHA: ${{ github.sha }}
          PROD_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROD_DB_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          PROD_REDIS_HOST: ${{ secrets.REDIS_HOST }}
          PROD_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          PROD_INTERNAL_JWT_SECRET: ${{ secrets.INTERNAL_JWT_SECRET }}
          PROD_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PROD_META_APP_ID: ${{ secrets.META_APP_ID }}
          PROD_META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          PROD_META_VERIFY_TOKEN: ${{ secrets.META_VERIFY_TOKEN }}
          PROD_META_CONFIG_ID: ${{ secrets.META_CONFIG_ID }}
          PROD_SYSTEM_USER_ID: ${{ secrets.SYSTEM_USER_ID }}
          PROD_INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PROD_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROD_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROD_GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
          PROD_XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          PROD_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PROD_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: |
            GHCR_PAT,GITHUB_ACTOR,GIT_SHA,
            PROD_DATABASE_URL,PROD_DB_PASSWORD,
            PROD_REDIS_HOST,PROD_REDIS_PASSWORD,
            PROD_INTERNAL_JWT_SECRET,PROD_ENCRYPTION_KEY,
            PROD_META_APP_ID,PROD_META_APP_SECRET,PROD_META_VERIFY_TOKEN,PROD_META_CONFIG_ID,PROD_SYSTEM_USER_ID,
            PROD_INTERNAL_API_KEY,
            PROD_OPENAI_API_KEY,PROD_ANTHROPIC_API_KEY,PROD_GOOGLE_AI_KEY,PROD_XAI_API_KEY,PROD_DEEPSEEK_API_KEY,
            PROD_TUNNEL_TOKEN
          script_stop: true
          # ↑ timeout: tiempo máximo para ESTABLECER la conexión SSH
          # ↑ command_timeout: tiempo máximo de ejecución del script completo
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            cd /opt/parallext-engine

            echo "===> Pulling latest infrastructure code..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            echo "===> Logging into GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io \
              -u "$GITHUB_ACTOR" --password-stdin

            echo "===> Pulling latest images..."
            docker pull ghcr.io/nipko/parallext-api:latest
            docker pull ghcr.io/nipko/parallext-worker:latest
            docker pull ghcr.io/nipko/parallext-dashboard:latest
            docker pull ghcr.io/nipko/parallext-whatsapp:latest
            docker pull ghcr.io/nipko/parallext-landing:latest

            echo "===> Ensuring postgres and redis are healthy..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              up -d postgres redis

            echo "===> Waiting for postgres to be ready..."
            for i in $(seq 1 12); do
              if docker compose -f infra/docker/docker-compose.prod.yml \
                  exec -T postgres \
                  pg_isready -U postgres > /dev/null 2>&1; then
                echo "  [OK] Postgres ready after ${i}s"
                break
              fi
              echo "  [$i/12] waiting for postgres..."
              sleep 5
            done

            echo "===> Generating production .env from GitHub Secrets..."
            > .env
            echo "# Parallext Engine - Production Configuration" >> .env
            echo "NODE_ENV=production" >> .env
            echo "LOG_LEVEL=info" >> .env
            echo "DATABASE_URL=${PROD_DATABASE_URL}" >> .env
            echo "DB_PASSWORD=${PROD_DB_PASSWORD}" >> .env
            echo "REDIS_HOST=${PROD_REDIS_HOST}" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=${PROD_REDIS_PASSWORD}" >> .env
            echo "INTERNAL_JWT_SECRET=${PROD_INTERNAL_JWT_SECRET}" >> .env
            echo "ENCRYPTION_KEY=${PROD_ENCRYPTION_KEY}" >> .env
            echo "META_APP_ID=${PROD_META_APP_ID}" >> .env
            echo "META_APP_SECRET=${PROD_META_APP_SECRET}" >> .env
            echo "META_VERIFY_TOKEN=${PROD_META_VERIFY_TOKEN}" >> .env
            echo "META_CONFIG_ID=${PROD_META_CONFIG_ID}" >> .env
            echo "SYSTEM_USER_ID=${PROD_SYSTEM_USER_ID}" >> .env
            echo "INTERNAL_API_KEY=${PROD_INTERNAL_API_KEY}" >> .env
            echo "WHATSAPP_VERIFY_TOKEN=${PROD_META_VERIFY_TOKEN}" >> .env
            echo "OPENAI_API_KEY=${PROD_OPENAI_API_KEY}" >> .env
            echo "ANTHROPIC_API_KEY=${PROD_ANTHROPIC_API_KEY}" >> .env
            echo "GOOGLE_GENERATIVE_AI_API_KEY=${PROD_GOOGLE_AI_KEY}" >> .env
            echo "XAI_API_KEY=${PROD_XAI_API_KEY}" >> .env
            echo "DEEPSEEK_API_KEY=${PROD_DEEPSEEK_API_KEY}" >> .env
            echo "# Frontend Defaults" >> .env
            echo "NEXT_PUBLIC_API_URL=https://api.parallly-chat.cloud/api/v1" >> .env
            echo "NEXT_PUBLIC_WA_SERVICE_URL=https://wa.parallly-chat.cloud/api/v1" >> .env
            echo "NEXT_PUBLIC_META_APP_ID=${PROD_META_APP_ID}" >> .env
            echo "NEXT_PUBLIC_META_CONFIG_ID=${PROD_META_CONFIG_ID}" >> .env
            echo "DASHBOARD_URL=https://admin.parallly-chat.cloud" >> .env
            echo "CLOUDFLARE_TUNNEL_TOKEN=${PROD_TUNNEL_TOKEN}" >> .env
            chmod 600 .env
            echo "  [OK] .env generated and secured"

            echo "===> Ensuring platform_settings table exists..."
            docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
              psql -U parallext -d parallext_engine -c "
                CREATE TABLE IF NOT EXISTS platform_settings (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(), key TEXT UNIQUE NOT NULL,
                  value TEXT, is_secret BOOLEAN DEFAULT false, category TEXT DEFAULT 'general',
                  created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ DEFAULT NOW()
                );
              " || true

            echo "===> Ensuring users columns exist..."
            docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
              psql -U parallext -d parallext_engine -c "
                ALTER TABLE public.users ADD COLUMN IF NOT EXISTS name TEXT
                  GENERATED ALWAYS AS (TRIM(first_name || ' ' || last_name)) STORED;
                ALTER TABLE public.users ADD COLUMN IF NOT EXISTS availability_status VARCHAR(20) DEFAULT 'offline';
                ALTER TABLE public.users ADD COLUMN IF NOT EXISTS max_capacity INTEGER DEFAULT 5;
                ALTER TABLE public.users ADD COLUMN IF NOT EXISTS last_active_at TIMESTAMPTZ;
              " || true

            echo "===> Running Prisma public schema migrations..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              run --rm \
              api npx prisma migrate deploy --schema=prisma/schema.prisma || true

            echo "===> Running tenant schema migration (idempotent)..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              run --rm api npm run migrate:tenants || true

            echo "===> Applying tenant-schema.sql to all existing tenants..."
            TENANTS=$(docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
              psql -U parallext -d parallext_engine -t -c "SELECT schema_name FROM tenants WHERE is_active = true;" 2>/dev/null | tr -d ' ' | grep -v '^$')
            for schema in $TENANTS; do
              echo "  Migrating tenant: $schema"
              cat apps/api/prisma/tenant-schema.sql | sed "s/{{SCHEMA_NAME}}/$schema/g" | \
                docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
                psql -U parallext -d parallext_engine 2>/dev/null || true
            done

            echo "===> Restarting API, Worker, Dashboard, and WhatsApp..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              up -d --force-recreate api worker dashboard whatsapp landing


            echo "===> Waiting for API health (max 3 min)..."
            STATUS="starting"
            for i in $(seq 1 36); do
              STATUS=$(docker inspect \
                --format='{{.State.Health.Status}}' parallext-api 2>/dev/null \
                || echo "starting")
              echo "  [$i/36] $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 5
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "::error::API not healthy after 3 minutes. Last 100 log lines:"
              docker logs parallext-api --tail 100
              exit 1
            fi

            echo "===> Ensuring tunnel is running..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d tunnel

            echo "===> 🚀 Deploy complete! SHA: $GIT_SHA"

      - name: Notify — secrets not configured
        if: steps.check_secrets.outputs.configured == 'false'
        run: |
          echo "## ⚠️ SSH Deploy Skipped" >> $GITHUB_STEP_SUMMARY
          echo "SERVER_HOST secret is not set. Images pushed to GHCR only." >> $GITHUB_STEP_SUMMARY

      - name: Build summary
        if: always()
        run: |
          echo "## 🚀 Images Published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Image | SHA |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ env.API_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| WhatsApp | \`${{ env.WHATSAPP_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\` | Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

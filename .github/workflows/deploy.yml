name: Deploy Parallext Engine

on:
  push:
    branches:
      - main
      - feature/parallly-commercial-domain
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/nipko/parallext-api
  WORKER_IMAGE: ghcr.io/nipko/parallext-worker
  DASHBOARD_IMAGE: ghcr.io/nipko/parallext-dashboard
  WHATSAPP_IMAGE: ghcr.io/nipko/parallext-whatsapp
  LANDING_IMAGE: ghcr.io/nipko/parallext-landing
  PROJECT_PATH: /opt/parallext-engine

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build & push Docker images to GHCR
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (API)
        run: cd apps/api && npx tsc --noEmit

      - name: TypeScript check (WhatsApp)
        run: cd apps/whatsapp && npx tsc --noEmit

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=billing-v2
          cache-to: type=gha,mode=max,scope=billing-v2

      - name: Smoke test API — verify module graph resolves
        run: |
          docker run --rm \
            -w /app \
            --entrypoint node \
            ${{ env.API_IMAGE }}:${{ github.sha }} \
            -e "
              // Verify all compiled modules can be required (catches missing deps, bad imports)
              try {
                const m = require('./dist/app.module');
                if (!m.AppModule) throw new Error('AppModule not exported');
                console.log('✅ AppModule loaded — all module imports resolved');
                process.exit(0);
              } catch(e) {
                console.error('❌ Module load FAILED:', e.message);
                process.exit(1);
              }
            "
        timeout-minutes: 1

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=billing-v2
          cache-to: type=gha,mode=max,scope=billing-v2

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.parallly-chat.cloud/api/v1
            NEXT_PUBLIC_WA_SERVICE_URL=https://wa.parallly-chat.cloud/api/v1
            NEXT_PUBLIC_META_APP_ID=${{ secrets.META_APP_ID }}
            NEXT_PUBLIC_META_CONFIG_ID=${{ secrets.META_CONFIG_ID }}
            NEXT_PUBLIC_META_BUSINESS_ID=${{ secrets.META_BUSINESS_ID }}
            NEXT_PUBLIC_META_SOLUTION_ID=${{ secrets.META_SOLUTION_ID }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            NEXT_PUBLIC_MESSENGER_FB_LOGIN_CONFIG_ID=${{ secrets.MESSENGER_FB_LOGIN_CONFIG_ID }}
            NEXT_PUBLIC_INSTAGRAM_APP_ID=1472258884595741
            NEXT_PUBLIC_INSTAGRAM_REDIRECT_URI=https://admin.parallly-chat.cloud/admin/channels/instagram/callback
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}
            NEXT_PUBLIC_MP_PUBLIC_KEY=${{ secrets.MP_PUBLIC_KEY }}
          cache-from: type=gha,scope=billing-v2
          cache-to: type=gha,mode=max,scope=billing-v2

      - name: Build and push WhatsApp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.whatsapp
          push: true
          tags: |
            ${{ env.WHATSAPP_IMAGE }}:latest
            ${{ env.WHATSAPP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=billing-v2
          cache-to: type=gha,mode=max,scope=billing-v2

      - name: Smoke test WhatsApp image modules
        run: |
          docker pull ${{ env.WHATSAPP_IMAGE }}:${{ github.sha }}
          docker run --rm --entrypoint node ${{ env.WHATSAPP_IMAGE }}:${{ github.sha }} -e "require('@nestjs/axios'); console.log('WhatsApp image module check OK')"

      - name: Build and push Landing image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.landing
          push: true
          tags: |
            ${{ env.LANDING_IMAGE }}:latest
            ${{ env.LANDING_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=billing-v2
          cache-to: type=gha,mode=max,scope=billing-v2

  # ──────────────────────────────────────────────────────────────
  # JOB 2: SSH into VPS and deploy
  # Uses: SERVER_HOST, SERVER_USER, SERVER_PASSWORD, SERVER_PORT
  # Project lives at /opt/parallext-engine/
  # ──────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Check if VPS secrets are configured
        id: check_secrets
        env:
          HOST_CHECK: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$HOST_CHECK" ]; then
            echo "::warning::SERVER_HOST not set — skipping SSH deploy."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to VPS
        if: steps.check_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GIT_SHA: ${{ github.sha }}
          PROD_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROD_DB_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          PROD_REDIS_HOST: ${{ secrets.REDIS_HOST }}
          PROD_REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          PROD_INTERNAL_JWT_SECRET: ${{ secrets.INTERNAL_JWT_SECRET }}
          PROD_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          PROD_META_APP_ID: ${{ secrets.META_APP_ID }}
          PROD_META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          PROD_META_VERIFY_TOKEN: ${{ secrets.META_VERIFY_TOKEN }}
          PROD_META_CONFIG_ID: ${{ secrets.META_CONFIG_ID }}
          PROD_SYSTEM_USER_ID: ${{ secrets.SYSTEM_USER_ID }}
          PROD_INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PROD_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROD_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROD_GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
          PROD_XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          PROD_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PROD_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          PROD_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          PROD_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          PROD_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          PROD_SMTP_HOST: ${{ secrets.SMTP_HOST }}
          PROD_SMTP_PORT: ${{ secrets.SMTP_PORT }}
          PROD_SMTP_USER: ${{ secrets.SMTP_USER }}
          PROD_SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PROD_BULL_BOARD_TOKEN: ${{ secrets.BULL_BOARD_TOKEN }}
          PROD_GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          PROD_JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          PROD_MS_AUTH_CLIENT_ID: ${{ secrets.MS_AUTH_CLIENT_ID }}
          PROD_MS_AUTH_CLIENT_SECRET: ${{ secrets.MS_AUTH_CLIENT_SECRET }}
          PROD_MS_CLIENT_ID: ${{ secrets.MS_AUTH_CLIENT_ID }}
          PROD_MS_CLIENT_SECRET: ${{ secrets.MS_AUTH_CLIENT_SECRET }}
          # MercadoPago (sandbox values today; same variable names in production)
          PROD_MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
          PROD_MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          PROD_MP_PUBLIC_KEY: ${{ secrets.MP_PUBLIC_KEY }}
          # Optional — comma separated list of ISO codes for which to sync
          # plans with MP on every deploy. Defaults to CO. Add more once you
          # have an MP account per country. Example secret value: "CO,AR,MX"
          PROD_MP_SYNC_COUNTRIES: ${{ secrets.MP_SYNC_COUNTRIES }}
          # Per-country USD→local FX rates. Override via secrets when prices drift.
          PROD_MP_FX_CO: ${{ secrets.MP_FX_CO }}
          PROD_MP_FX_AR: ${{ secrets.MP_FX_AR }}
          PROD_MP_FX_MX: ${{ secrets.MP_FX_MX }}
          PROD_MP_FX_CL: ${{ secrets.MP_FX_CL }}
          PROD_MP_FX_PE: ${{ secrets.MP_FX_PE }}
          PROD_MP_FX_UY: ${{ secrets.MP_FX_UY }}
          PROD_MP_FX_BR: ${{ secrets.MP_FX_BR }}
          # External CRM integrations (HubSpot first; pipedrive/kommo later)
          PROD_HUBSPOT_CLIENT_ID: ${{ secrets.HUBSPOT_CLIENT_ID }}
          PROD_HUBSPOT_CLIENT_SECRET: ${{ secrets.HUBSPOT_CLIENT_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: |
            GHCR_PAT,GITHUB_ACTOR,GIT_SHA,
            PROD_DATABASE_URL,PROD_DB_PASSWORD,
            PROD_REDIS_HOST,PROD_REDIS_PASSWORD,
            PROD_INTERNAL_JWT_SECRET,PROD_ENCRYPTION_KEY,
            PROD_META_APP_ID,PROD_META_APP_SECRET,PROD_META_VERIFY_TOKEN,PROD_META_CONFIG_ID,PROD_SYSTEM_USER_ID,
            PROD_INTERNAL_API_KEY,
            PROD_OPENAI_API_KEY,PROD_ANTHROPIC_API_KEY,PROD_GOOGLE_AI_KEY,PROD_XAI_API_KEY,PROD_DEEPSEEK_API_KEY,
            PROD_TUNNEL_TOKEN,PROD_GOOGLE_OAUTH_CLIENT_ID,PROD_GOOGLE_OAUTH_CLIENT_SECRET,
            PROD_SENTRY_DSN,
            PROD_SMTP_HOST,PROD_SMTP_PORT,PROD_SMTP_USER,PROD_SMTP_PASS,
            PROD_BULL_BOARD_TOKEN,PROD_GRAFANA_PASSWORD,PROD_JWT_REFRESH_SECRET,
            PROD_MS_AUTH_CLIENT_ID,PROD_MS_AUTH_CLIENT_SECRET,
            PROD_MS_CLIENT_ID,PROD_MS_CLIENT_SECRET,
            PROD_MP_ACCESS_TOKEN,PROD_MP_WEBHOOK_SECRET,PROD_MP_PUBLIC_KEY,
            PROD_MP_SYNC_COUNTRIES,
            PROD_MP_FX_CO,PROD_MP_FX_AR,PROD_MP_FX_MX,PROD_MP_FX_CL,PROD_MP_FX_PE,PROD_MP_FX_UY,PROD_MP_FX_BR,
            PROD_HUBSPOT_CLIENT_ID,PROD_HUBSPOT_CLIENT_SECRET
          script_stop: true
          # ↑ timeout: tiempo máximo para ESTABLECER la conexión SSH
          # ↑ command_timeout: tiempo máximo de ejecución del script completo
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            cd /opt/parallext-engine

            echo "===> Pulling latest infrastructure code..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            echo "===> Logging into GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io \
              -u "$GITHUB_ACTOR" --password-stdin

            echo "===> Pulling latest images..."
            docker pull ghcr.io/nipko/parallext-api:latest
            docker pull ghcr.io/nipko/parallext-worker:latest
            docker pull ghcr.io/nipko/parallext-dashboard:latest
            docker pull ghcr.io/nipko/parallext-whatsapp:latest
            docker pull ghcr.io/nipko/parallext-landing:latest

            echo "===> Ensuring postgres and redis are healthy..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              up -d postgres redis

            echo "===> Waiting for postgres to be ready..."
            for i in $(seq 1 12); do
              if docker compose -f infra/docker/docker-compose.prod.yml \
                  exec -T postgres \
                  pg_isready -U postgres > /dev/null 2>&1; then
                echo "  [OK] Postgres ready after ${i}s"
                break
              fi
              echo "  [$i/12] waiting for postgres..."
              sleep 5
            done

            echo "===> Generating production .env from GitHub Secrets..."
            > .env
            echo "# Parallext Engine - Production Configuration" >> .env
            echo "NODE_ENV=production" >> .env
            echo "LOG_LEVEL=info" >> .env
            echo "DATABASE_URL=postgresql://parallext:${PROD_DB_PASSWORD}@pgbouncer:6432/parallext_engine" >> .env
            echo "DIRECT_DATABASE_URL=postgresql://parallext:${PROD_DB_PASSWORD}@postgres:5432/parallext_engine" >> .env
            echo "DB_PASSWORD=${PROD_DB_PASSWORD}" >> .env
            echo "REDIS_HOST=${PROD_REDIS_HOST}" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=${PROD_REDIS_PASSWORD}" >> .env
            echo "INTERNAL_JWT_SECRET=${PROD_INTERNAL_JWT_SECRET}" >> .env
            echo "JWT_SECRET=${PROD_INTERNAL_JWT_SECRET}" >> .env
            echo "JWT_REFRESH_SECRET=${PROD_JWT_REFRESH_SECRET}" >> .env
            echo "ENCRYPTION_KEY=${PROD_ENCRYPTION_KEY}" >> .env
            echo "META_APP_ID=${PROD_META_APP_ID}" >> .env
            echo "META_APP_SECRET=${PROD_META_APP_SECRET}" >> .env
            echo "META_VERIFY_TOKEN=${PROD_META_VERIFY_TOKEN}" >> .env
            echo "META_CONFIG_ID=${PROD_META_CONFIG_ID}" >> .env
            echo "SYSTEM_USER_ID=${PROD_SYSTEM_USER_ID}" >> .env
            echo "INTERNAL_API_KEY=${PROD_INTERNAL_API_KEY}" >> .env
            echo "WHATSAPP_VERIFY_TOKEN=${PROD_META_VERIFY_TOKEN}" >> .env
            echo "# Messenger OAuth" >> .env
            echo "MESSENGER_FB_LOGIN_CONFIG_ID=${{ secrets.MESSENGER_FB_LOGIN_CONFIG_ID }}" >> .env
            echo "MESSENGER_REDIRECT_URI=https://admin.parallly-chat.cloud/admin/channels/messenger" >> .env
            echo "# Instagram OAuth" >> .env
            echo "INSTAGRAM_APP_ID=1472258884595741" >> .env
            echo "INSTAGRAM_APP_SECRET=${{ secrets.INSTAGRAM_APP_SECRET }}" >> .env
            echo "INSTAGRAM_REDIRECT_URI=https://admin.parallly-chat.cloud/admin/channels/instagram/callback" >> .env
            echo "OPENAI_API_KEY=${PROD_OPENAI_API_KEY}" >> .env
            echo "ANTHROPIC_API_KEY=${PROD_ANTHROPIC_API_KEY}" >> .env
            echo "GOOGLE_GENERATIVE_AI_API_KEY=${PROD_GOOGLE_AI_KEY}" >> .env
            echo "XAI_API_KEY=${PROD_XAI_API_KEY}" >> .env
            echo "DEEPSEEK_API_KEY=${PROD_DEEPSEEK_API_KEY}" >> .env
            echo "# Frontend Defaults" >> .env
            echo "NEXT_PUBLIC_API_URL=https://api.parallly-chat.cloud/api/v1" >> .env
            echo "NEXT_PUBLIC_WA_SERVICE_URL=https://wa.parallly-chat.cloud/api/v1" >> .env
            echo "NEXT_PUBLIC_META_APP_ID=${PROD_META_APP_ID}" >> .env
            echo "NEXT_PUBLIC_META_CONFIG_ID=${PROD_META_CONFIG_ID}" >> .env
            echo "GOOGLE_OAUTH_CLIENT_ID=${PROD_GOOGLE_OAUTH_CLIENT_ID}" >> .env
            echo "GOOGLE_OAUTH_CLIENT_SECRET=${PROD_GOOGLE_OAUTH_CLIENT_SECRET}" >> .env
            echo "GOOGLE_CALENDAR_REDIRECT_URI=https://api.parallly-chat.cloud/api/v1/calendar/google/callback" >> .env
            echo "SENTRY_DSN=${PROD_SENTRY_DSN}" >> .env
            echo "# SMTP" >> .env
            echo "SMTP_HOST=${PROD_SMTP_HOST}" >> .env
            echo "SMTP_PORT=${PROD_SMTP_PORT:-587}" >> .env
            echo "SMTP_USER=${PROD_SMTP_USER}" >> .env
            echo "SMTP_PASS=${PROD_SMTP_PASS}" >> .env
            echo "SMTP_FROM=Parallly <${PROD_SMTP_USER}>" >> .env
            echo "DASHBOARD_URL=https://admin.parallly-chat.cloud" >> .env
            echo "CLOUDFLARE_TUNNEL_TOKEN=${PROD_TUNNEL_TOKEN}" >> .env
            echo "# Observability" >> .env
            echo "BULL_BOARD_TOKEN=${PROD_BULL_BOARD_TOKEN}" >> .env
            echo "GRAFANA_PASSWORD=${PROD_GRAFANA_PASSWORD}" >> .env
            echo "# Microsoft OAuth" >> .env
            echo "MS_AUTH_CLIENT_ID=${PROD_MS_AUTH_CLIENT_ID}" >> .env
            echo "MS_AUTH_CLIENT_SECRET=${PROD_MS_AUTH_CLIENT_SECRET}" >> .env
            echo "MS_AUTH_REDIRECT_URI=https://api.parallly-chat.cloud/api/v1/auth/microsoft/callback" >> .env
            echo "# Microsoft Calendar (same app as auth)" >> .env
            echo "MS_CLIENT_ID=${PROD_MS_CLIENT_ID}" >> .env
            echo "MS_CLIENT_SECRET=${PROD_MS_CLIENT_SECRET}" >> .env
            echo "MS_TENANT_ID=common" >> .env
            echo "MS_CALENDAR_REDIRECT_URI=https://api.parallly-chat.cloud/api/v1/calendar/microsoft/callback" >> .env
            echo "# MercadoPago (Billing)" >> .env
            echo "MP_ACCESS_TOKEN=${PROD_MP_ACCESS_TOKEN}" >> .env
            echo "MP_WEBHOOK_SECRET=${PROD_MP_WEBHOOK_SECRET}" >> .env
            echo "MP_PUBLIC_KEY=${PROD_MP_PUBLIC_KEY}" >> .env
            echo "MP_WEBHOOK_URL=https://api.parallly-chat.cloud/api/v1/billing/webhook/mercadopago" >> .env
            echo "# External CRM integrations" >> .env
            echo "HUBSPOT_CLIENT_ID=${PROD_HUBSPOT_CLIENT_ID}" >> .env
            echo "HUBSPOT_CLIENT_SECRET=${PROD_HUBSPOT_CLIENT_SECRET}" >> .env
            echo "API_PUBLIC_URL=https://api.parallly-chat.cloud/api/v1" >> .env
            echo "DASHBOARD_URL=https://admin.parallly-chat.cloud" >> .env
            chmod 600 .env
            echo "  [OK] .env generated and secured"

            echo "===> Ensuring platform_settings table exists..."
            docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
              psql -U parallext -d parallext_engine -c "
                CREATE TABLE IF NOT EXISTS platform_settings (
                  id UUID PRIMARY KEY DEFAULT gen_random_uuid(), key TEXT UNIQUE NOT NULL,
                  value TEXT, is_secret BOOLEAN DEFAULT false, category TEXT DEFAULT 'general',
                  created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ DEFAULT NOW()
                );
              " || true

            echo "===> Ensuring users columns exist..."
            docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
              psql -U parallext -d parallext_engine \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS availability_status VARCHAR(20) DEFAULT 'offline';" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS max_capacity INTEGER DEFAULT 5;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS last_active_at TIMESTAMPTZ;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS auth_provider VARCHAR(20) DEFAULT 'email';" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS google_id TEXT;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS microsoft_id TEXT;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS picture TEXT;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS email_verified BOOLEAN DEFAULT false;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS email_verify_code TEXT;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS email_verify_expires TIMESTAMPTZ;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS onboarding_completed BOOLEAN DEFAULT false;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS last_login_at TIMESTAMPTZ;" \
              -c "ALTER TABLE public.users ADD COLUMN IF NOT EXISTS skill_tags TEXT[] DEFAULT '{}';" \
              -c "ALTER TABLE public.users ALTER COLUMN password DROP NOT NULL;" \
              || true

            echo "===> Running Prisma public schema migrations..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              run --rm \
              api npx prisma migrate deploy --schema=prisma/schema.prisma || true

            echo "===> Running tenant schema migration (idempotent)..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              run --rm api npm run migrate:tenants || true

            echo "===> Seeding billing_plans (idempotent upsert)..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              run --rm api node prisma/seed-billing-plans.js || true

            echo "===> Syncing billing plans to MercadoPago (Colombia)..."
            # Per-country sync. Colombia is the primary launch market. To add
            # another country later, duplicate the line below with its ISO
            # code + FX rate from secrets (e.g. PROD_MP_FX_MX for Mexico).
            # The script is idempotent — already-synced tiers are skipped.
            # appleboy/ssh-action wraps each line with exit-code tracking and
            # chokes on bash arrays / case statements, so we keep the loop
            # unrolled as plain sequential invocations.
            docker compose -f infra/docker/docker-compose.prod.yml run --rm api node scripts/sync-mp-plans.js --country=CO --fx="${PROD_MP_FX_CO:-4200}" || true
            # Add below when opening new countries:
            # docker compose -f infra/docker/docker-compose.prod.yml run --rm api node scripts/sync-mp-plans.js --country=MX --fx="${PROD_MP_FX_MX:-18.5}" || true
            # docker compose -f infra/docker/docker-compose.prod.yml run --rm api node scripts/sync-mp-plans.js --country=AR --fx="${PROD_MP_FX_AR:-1200}" || true

            echo "===> Fixing calendar_integrations UNIQUE index on all tenants..."
            for schema in $(docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
              psql -U parallext -d parallext_engine -t -c "SELECT schema_name FROM tenants WHERE is_active = true;" 2>/dev/null | tr -d ' ' | grep -v '^$'); do
              docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
                psql -U parallext -d parallext_engine -c "
                  DROP INDEX IF EXISTS ${schema}.ci_user_idx;
                  CREATE UNIQUE INDEX IF NOT EXISTS ci_user_idx ON ${schema}.calendar_integrations (user_id, provider);
                " 2>/dev/null || true
            done

            echo "===> Applying tenant-schema.sql to all existing tenants..."
            TENANTS=$(docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
              psql -U parallext -d parallext_engine -t -c "SELECT schema_name FROM tenants WHERE is_active = true;" 2>/dev/null | tr -d ' ' | grep -v '^$')
            for schema in $TENANTS; do
              echo "  Migrating tenant: $schema"
              cat apps/api/prisma/tenant-schema.sql | sed "s/{{SCHEMA_NAME}}/$schema/g" | \
                docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
                psql -U parallext -d parallext_engine 2>/dev/null || true
            done

            echo "===> Restarting API, Worker, Dashboard, and WhatsApp..."
            docker compose -f infra/docker/docker-compose.prod.yml \
              up -d --force-recreate api worker dashboard whatsapp landing


            echo "===> Waiting for API health (max 3 min)..."
            STATUS="starting"
            for i in $(seq 1 36); do
              STATUS=$(docker inspect \
                --format='{{.State.Health.Status}}' parallext-api 2>/dev/null \
                || echo "starting")
              echo "  [$i/36] $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 5
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "::error::API not healthy after 3 minutes. Last 100 log lines:"
              docker logs parallext-api --tail 100
              exit 1
            fi

            echo "===> Ensuring tunnel is running..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d tunnel

            echo "===> 🚀 Deploy complete! SHA: $GIT_SHA"

      - name: Notify — secrets not configured
        if: steps.check_secrets.outputs.configured == 'false'
        run: |
          echo "## ⚠️ SSH Deploy Skipped" >> $GITHUB_STEP_SUMMARY
          echo "SERVER_HOST secret is not set. Images pushed to GHCR only." >> $GITHUB_STEP_SUMMARY

      - name: Build summary
        if: always()
        run: |
          echo "## 🚀 Images Published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Image | SHA |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ env.API_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | \`${{ env.WORKER_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| WhatsApp | \`${{ env.WHATSAPP_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Landing | \`${{ env.LANDING_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\` | Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

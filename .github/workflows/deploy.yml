name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          envs: GH_TOKEN
          command_timeout: 15m
          script: |
            set -e
            echo "🚀 Iniciando despliegue de Parallext Engine..."
            
            # 1. Preparar directorio
            mkdir -p /opt/parallext-engine
            cd /opt/parallext-engine
            
            # 2. Clonar o actualizar código
            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            if [ ! -d ".git" ]; then
              echo "📦 Clonando repositorio..."
              git clone $REPO_URL .
            else
              echo "🔄 Actualizando repositorio..."
              git remote set-url origin $REPO_URL
              git fetch origin
              git reset --hard origin/main
            fi
            # Limpiar token del remote
            git remote set-url origin https://github.com/${{ github.repository }}.git
            
            # 3. Crear .env si no existe
            if [ ! -f ".env" ]; then
              echo "📝 Creando .env desde .env.example..."
              cp .env.example .env
              echo "⚠️  IMPORTANTE: Edita /opt/parallext-engine/.env con tus credenciales reales"
            fi
            
            # 4. Bajar contenedores anteriores
            echo "🛑 Deteniendo servicios anteriores..."
            docker compose -f infra/docker/docker-compose.prod.yml down || true
            
            # 5. Construir y levantar TODO el stack
            echo "🐳 Construyendo y levantando el stack completo..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d --build
            
            # 6. Verificar
            sleep 10
            echo ""
            echo "📊 Estado de los contenedores:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo ""
            echo "✅ Despliegue completado"
            echo "🌐 API:       http://api.parallly-chat.cloud"
            echo "🛠️ Dashboard: http://admin.parallly-chat.cloud"

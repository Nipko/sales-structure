name: Deploy Parallext Engine

on:
  push:
    branches:
      - main
      - feature/parallly-commercial-domain
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/nipko/parallext-api
  DASHBOARD_IMAGE: ghcr.io/nipko/parallext-dashboard
  PROJECT_PATH: /opt/parallext-engine

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build & push Docker images to GHCR
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 2: SSH into VPS and deploy
  # Uses: SERVER_HOST, SERVER_USER, SERVER_PASSWORD, SERVER_PORT
  # Project lives at /opt/parallext-engine/
  # ──────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Check if VPS secrets are configured
        id: check_secrets
        env:
          HOST_CHECK: ${{ secrets.SERVER_HOST }}
        run: |
          if [ -z "$HOST_CHECK" ]; then
            echo "::warning::SERVER_HOST not set — skipping SSH deploy."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to VPS
        if: steps.check_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: GHCR_PAT,GITHUB_ACTOR,GIT_SHA
          script_stop: true
          # ↑ timeout: tiempo máximo para ESTABLECER la conexión SSH
          # ↑ command_timeout: tiempo máximo de ejecución del script completo
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            cd /opt/parallext-engine

            echo "===> Logging into GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io \
              -u "$GITHUB_ACTOR" --password-stdin

            echo "===> Pulling latest images..."
            docker pull ghcr.io/nipko/parallext-api:latest
            docker pull ghcr.io/nipko/parallext-dashboard:latest

            echo "===> Ensuring postgres and redis are healthy..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d postgres redis

            echo "===> Waiting for postgres to be ready..."
            for i in $(seq 1 12); do
              if docker compose -f infra/docker/docker-compose.prod.yml exec -T postgres \
                  pg_isready -U postgres > /dev/null 2>&1; then
                echo "  [OK] Postgres ready after ${i}s"
                break
              fi
              echo "  [$i/12] waiting for postgres..."
              sleep 5
            done

            echo "===> Running Prisma migrations..."
            docker compose -f infra/docker/docker-compose.prod.yml run --rm \
              api npx prisma migrate deploy --schema=prisma/schema.prisma

            echo "===> Running tenant schema migration (idempotent)..."
            docker run --rm \
              --network parallext-engine_default \
              --env-file /opt/parallext-engine/.env \
              ghcr.io/nipko/parallext-api:latest \
              node -e "
                const { PrismaClient } = require('@prisma/client');
                const fs   = require('fs');
                const path = require('path');
                const prisma = new PrismaClient();

                async function migrate() {
                  const tpl = fs.readFileSync(
                    path.join(process.cwd(), 'prisma/tenant-schema.sql'), 'utf-8'
                  );
                  const tenants = await prisma.\$queryRaw\`
                    SELECT schema_name FROM tenants WHERE is_active = true
                  \`;
                  console.log('Found', tenants.length, 'active tenants');
                  for (const t of tenants) {
                    const sql = tpl.replace(/\{\{SCHEMA_NAME\}\}/g, t.schema_name);
                    const stmts = sql.split(';')
                      .map(s => s.trim())
                      .filter(s => s.length > 0 && !s.startsWith('--'));
                    for (const stmt of stmts) {
                      try {
                        await prisma.\$executeRawUnsafe(stmt + ';');
                      } catch (e) {
                        if (!e.message.includes('already exists') &&
                            !e.message.includes('duplicate')) throw e;
                      }
                    }
                    console.log('  [OK]', t.schema_name);
                  }
                  await prisma.\$disconnect();
                  console.log('Tenant migration complete!');
                }
                migrate().catch(e => { console.error(e); process.exit(1); });
              "

            echo "===> Restarting API and Dashboard..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d --force-recreate api dashboard

            echo "===> Waiting for API health (max 3 min)..."
            STATUS="starting"
            for i in $(seq 1 36); do
              STATUS=$(docker inspect \
                --format='{{.State.Health.Status}}' parallext-api 2>/dev/null \
                || echo "starting")
              echo "  [$i/36] $STATUS"
              [ "$STATUS" = "healthy" ] && break
              sleep 5
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "::error::API not healthy after 3 minutes. Last 100 log lines:"
              docker logs parallext-api --tail 100
              exit 1
            fi

            echo "===> Ensuring tunnel is running..."
            docker compose -f infra/docker/docker-compose.prod.yml up -d tunnel

            echo "===> 🚀 Deploy complete! SHA: $GIT_SHA"

      - name: Notify — secrets not configured
        if: steps.check_secrets.outputs.configured == 'false'
        run: |
          echo "## ⚠️ SSH Deploy Skipped" >> $GITHUB_STEP_SUMMARY
          echo "SERVER_HOST secret is not set. Images pushed to GHCR only." >> $GITHUB_STEP_SUMMARY

      - name: Build summary
        if: always()
        run: |
          echo "## 🚀 Images Published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Image | SHA |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ env.API_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\` | Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

# ============================================
# Parallext Engine — Production Stack
# Domain: parallly-chat.cloud
# Subdomains:
#   api.parallly-chat.cloud   → NestJS API (:3000)
#   admin.parallly-chat.cloud → Next.js Dashboard (:3001)
# ============================================

services:
  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: parallext-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - dashboard

  # ---- API Server ----
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    container_name: parallext-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ../../.env
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Dashboard ----
  dashboard:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.dashboard
    container_name: parallext-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.parallly-chat.cloud
    expose:
      - "3001"
    depends_on:
      - api

  # ---- PostgreSQL + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: parallext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parallext
      POSTGRES_PASSWORD: ${DB_PASSWORD:-parallext_secret}
      POSTGRES_DB: parallext_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U parallext -d parallext_engine" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: parallext-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: parallext-postgres-data
  redis_data:
    name: parallext-redis-data

# Parallext Engine - Production Docker Compose
# Auto-deploys via Watchtower when new images are pushed to GHCR

services:
  # ---- Cloudflare Tunnel ----
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: parallext-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run parallext
    volumes:
      - /opt/cloudflared:/etc/cloudflared:ro
    depends_on:
      - api
      - dashboard
      - whatsapp
      - landing

  # ---- Landing Page (static site) ----
  landing:
    image: ghcr.io/nipko/parallext-landing:latest
    container_name: parallext-landing
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---- PgBouncer (Connection Pooler) ----
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: parallext-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      AUTH_TYPE: md5
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      MAX_CLIENT_CONN: "500"
      SERVER_IDLE_TIMEOUT: "300"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    expose:
      - "5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "parallext"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- API Server ----
  api:
    image: ghcr.io/nipko/parallext-api:latest
    container_name: parallext-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@pgbouncer:5432/parallext_engine?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEDIA_STORAGE_PATH: /data/media
    env_file:
      - ../../.env
    volumes:
      - media_data:/data/media
    expose:
      - "3000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---- Dashboard ----
  dashboard:
    image: ghcr.io/nipko/parallext-dashboard:latest
    container_name: parallext-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.parallly-chat.cloud
    expose:
      - "3001"
    depends_on:
      - api
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---- Background Worker (BullMQ processors + cron jobs) ----
  worker:
    image: ghcr.io/nipko/parallext-worker:latest
    container_name: parallext-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@pgbouncer:5432/parallext_engine?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ../../.env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---- WhatsApp Onboarding Service ----
  whatsapp:
    image: ghcr.io/nipko/parallext-whatsapp:latest
    container_name: parallext-whatsapp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@pgbouncer:5432/parallext_engine?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    env_file:
      - ../../.env
    expose:
      - "3002"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3002/api/v1/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---- PostgreSQL + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: parallext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parallext
      POSTGRES_PASSWORD: ${DB_PASSWORD:-parallext_secret}
      POSTGRES_DB: parallext_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U parallext -d parallext_engine" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: parallext-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Watchtower (auto-deploys new images) ----
  watchtower:
    image: containrrr/watchtower
    container_name: parallext-watchtower
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.45"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro

volumes:
  postgres_data:
    name: parallext-postgres-data
  redis_data:
    name: parallext-redis-data
  media_data:
    name: parallext-media-data

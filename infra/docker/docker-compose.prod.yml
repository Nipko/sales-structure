# Parallext Engine - Production Docker Compose
# Auto-deploys via Watchtower when new images are pushed to GHCR

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ---- Cloudflare Tunnel ----
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: parallext-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run parallext
    volumes:
      - /opt/cloudflared:/etc/cloudflared:ro
    depends_on:
      - api
      - dashboard
      - whatsapp
      - landing
    logging: *default-logging

  # ---- Landing Page (static site) ----
  landing:
    image: ghcr.io/nipko/parallext-landing:latest
    container_name: parallext-landing
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging: *default-logging

  # ---- PgBouncer (Connection Pooler) ----
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: parallext-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      AUTH_TYPE: md5
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      MAX_CLIENT_CONN: "500"
      SERVER_IDLE_TIMEOUT: "300"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    expose:
      - "5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "parallext"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---- API Server ----
  api:
    image: ghcr.io/nipko/parallext-api:latest
    container_name: parallext-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@pgbouncer:5432/parallext_engine?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEDIA_STORAGE_PATH: /data/media
    env_file:
      - ../../.env
    volumes:
      - media_data:/data/media
      - api_logs:/data/logs
    expose:
      - "3000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging: *default-logging

  # ---- Dashboard ----
  dashboard:
    image: ghcr.io/nipko/parallext-dashboard:latest
    container_name: parallext-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.parallly-chat.cloud
    expose:
      - "3001"
    depends_on:
      - api
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging: *default-logging

  # ---- Background Worker (BullMQ processors + cron jobs) ----
  worker:
    image: ghcr.io/nipko/parallext-worker:latest
    container_name: parallext-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@pgbouncer:5432/parallext_engine?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - ../../.env
    volumes:
      - worker_logs:/data/logs
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging: *default-logging

  # ---- WhatsApp Onboarding Service ----
  whatsapp:
    image: ghcr.io/nipko/parallext-whatsapp:latest
    container_name: parallext-whatsapp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@pgbouncer:5432/parallext_engine?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://parallext:${DB_PASSWORD:-parallext_secret}@postgres:5432/parallext_engine
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    env_file:
      - ../../.env
    expose:
      - "3002"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3002/api/v1/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging: *default-logging

  # ---- PostgreSQL + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: parallext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parallext
      POSTGRES_PASSWORD: ${DB_PASSWORD:-parallext_secret}
      POSTGRES_DB: parallext_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U parallext -d parallext_engine" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: parallext-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---- Watchtower (auto-deploys new images) ----
  watchtower:
    image: containrrr/watchtower
    container_name: parallext-watchtower
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.45"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    logging: *default-logging

  # ============================================
  # OBSERVABILITY STACK
  # ============================================

  # ---- Dozzle (real-time Docker log viewer) ----
  dozzle:
    image: amir20/dozzle:latest
    container_name: parallext-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:9999:8080"
    mem_limit: 64m
    logging: *default-logging

  # ---- Uptime Kuma (endpoint monitoring + alerting) ----
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: parallext-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3003:3001"
    mem_limit: 192m
    logging: *default-logging

  # ---- Grafana (dashboards + alerting) ----
  grafana:
    image: grafana/grafana:latest
    container_name: parallext-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-parallly-grafana-2026}
      GF_SERVER_ROOT_URL: https://grafana.parallly-chat.cloud
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3004:3000"
    mem_limit: 256m
    logging: *default-logging

  # ---- Loki (log aggregation for Grafana) ----
  loki:
    image: grafana/loki:3.0.0
    container_name: parallext-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    mem_limit: 384m
    logging: *default-logging

volumes:
  postgres_data:
    name: parallext-postgres-data
  redis_data:
    name: parallext-redis-data
  media_data:
    name: parallext-media-data
  api_logs:
    name: parallext-api-logs
  worker_logs:
    name: parallext-worker-logs
  uptime_kuma_data:
    name: parallext-uptime-kuma-data
  grafana_data:
    name: parallext-grafana-data
  loki_data:
    name: parallext-loki-data

# ============================================
# api.parallly-chat.cloud → NestJS API
# ============================================

upstream api_backend {
    server api:3000;
}

server {
    listen 80;
    server_name api.parallly-chat.cloud;

    # Webhook endpoint (WhatsApp, etc.) — higher rate limit
    location /webhooks/ {
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }
}

# ============================================
# admin.parallly-chat.cloud → Next.js Dashboard
# ============================================

upstream dashboard_backend {
    server dashboard:3001;
}

server {
    listen 80;
    server_name admin.parallly-chat.cloud;

    location / {
        proxy_pass http://dashboard_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets
    location /_next/ {
        proxy_pass http://dashboard_backend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================
# Default — reject unknown hosts
# ============================================
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

[databases]
; All connections route to the parallext_engine database on the postgres host
parallext_engine = host=postgres port=5432 dbname=parallext_engine

[pgbouncer]
; Listen on all interfaces inside the container
listen_addr = 0.0.0.0
listen_port = 6432

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool mode: transaction is REQUIRED for schema-per-tenant (SET LOCAL search_path)
pool_mode = transaction

; Pool sizing
; default_pool_size: max connections per user/database pair TO PostgreSQL
; With 3 services (API + Worker + WhatsApp), each opening ~10 connections,
; PgBouncer funnels them through 25 real PG connections
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Client limits
; max_client_conn: how many total client connections PgBouncer accepts
max_client_conn = 500

; Timeouts
server_idle_timeout = 300
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 30
query_wait_timeout = 30

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin access (for monitoring via pgbouncer SHOW commands)
admin_users = parallext
stats_users = parallext

; Ignore SET statements that Prisma sends (important for compatibility)
ignore_startup_parameters = extra_float_digits,options
